<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeTT – Player</title>
  <link rel="stylesheet" href="player.css" />

</head>
<body>

  <!-- Minimal header -->
  <div id="player-header">
    <span class="app-title">&#x2694; FreeTT</span>
    <span id="connection-status" class="connection-status">Verbinde…</span>
    <button id="ruler-btn" title="Lineal ein/aus">&#x1F4CF;</button>
    <button id="fullscreen-btn" title="Vollbild ein/aus">&#x26F6;</button>
  </div>

  <!-- Canvas area -->
  <div id="canvas-container">
    <div id="waiting-screen" class="waiting-screen">
      <div class="waiting-inner">
        <div class="waiting-icon">&#x2694;</div>
        <h2>Warte auf den Dungeon Master…</h2>
        <p id="waiting-detail">Verbinde mit Session…</p>
      </div>
    </div>

    <!-- Rendering layers (bottom to top) -->
    <canvas id="canvas-image"          class="canvas-layer"></canvas>
    <canvas id="canvas-grid"           class="canvas-layer canvas-grid-layer"></canvas>
    <canvas id="canvas-monster-tokens" class="canvas-layer canvas-tokens-layer"></canvas>
    <canvas id="canvas-fog"            class="canvas-layer canvas-fog-player"></canvas>
    <canvas id="canvas-tokens"         class="canvas-layer canvas-tokens-layer"></canvas>
    <!-- Ruler overlay (drawn on by JS, pointer-events: none) -->
    <canvas id="canvas-ruler"          class="canvas-layer canvas-ruler-layer"></canvas>
    <!-- Transparent top layer for mouse/touch events -->
    <canvas id="canvas-events"         class="canvas-layer canvas-events-layer"></canvas>
  </div>

  <script src="player.js"></script>
</body>
</html>
