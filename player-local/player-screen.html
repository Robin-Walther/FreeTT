<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; img-src 'self' file: data:; media-src 'self' file:; script-src 'self' file:; style-src 'self' 'unsafe-inline' file:;" />
  <title>FreeTT – Player Screen</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="player-body">

  <!-- Minimal header -->
  <div id="player-header">
    <span class="app-title">⚔ FreeTT</span>
    <button id="fullscreen-btn" title="Vollbild ein/aus">&#x26F6;</button>
  </div>

  <!-- Floating exit-fullscreen button (visible only in fullscreen) -->
  <button id="fullscreen-exit-btn" title="Vollbild beenden" style="display:none">&#x2715;</button>

  <!-- Canvas area -->
  <div id="canvas-container" class="canvas-container">
    <div id="waiting-screen" class="waiting-screen">
      <div class="waiting-inner">
        <div class="waiting-icon">⚔</div>
        <h2>Warte auf den Dungeon Master...</h2>
        <p>Der DM lädt noch eine Karte.</p>
      </div>
    </div>

    <!-- Image layer -->
    <canvas id="canvas-image" class="canvas-layer"></canvas>
    <!-- Grid overlay (above image, below fog) -->
    <canvas id="canvas-grid" class="canvas-layer canvas-grid-layer"></canvas>
    <!-- Monster token layer (below fog — hidden by fog) -->
    <canvas id="canvas-monster-tokens" class="canvas-layer canvas-tokens-layer"></canvas>
    <!-- Fog overlay (player sees solid black fog) -->
    <canvas id="canvas-fog" class="canvas-layer canvas-fog-player"></canvas>
    <!-- Player token layer (above fog — always visible) -->
    <canvas id="canvas-tokens" class="canvas-layer canvas-tokens-layer"></canvas>
    <!-- Ping animation layer -->
    <canvas id="canvas-ping" class="canvas-layer canvas-ping-layer"></canvas>
  </div>

  <script src="player-screen.js"></script>
</body>
</html>
