<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' file: data:; media-src 'self' file:; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>FreeTT – DM Screen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dm-body">

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-left">
      <span class="app-title">⚔ DM Screen</span>
    </div>
    <div class="toolbar-center">
      <button id="btn-tool-reveal" class="btn btn-tool active" data-tool="reveal" title="Nebel aufdecken">
        <span class="tool-icon">☀</span> Aufdecken
      </button>
      <button id="btn-tool-hide" class="btn btn-tool" data-tool="hide" title="Nebel verdecken">
        <span class="tool-icon">🌑</span> Verdecken
      </button>
      <button id="btn-tool-ruler" class="btn btn-tool" data-tool="ruler" title="Entfernung messen">
        <span class="tool-icon">📏</span> Lineal
      </button>
      <div id="ruler-status" class="ruler-status" style="display:none">
        <span id="ruler-status-text"></span>
        <button id="btn-recalibrate" class="btn btn-secondary">Kalibrieren</button>
      </div>
      <div class="separator"></div>
      <label class="label-sm">Pinselgröße</label>
      <input id="brush-size" type="range" min="10" max="200" value="60" />
      <span id="brush-size-val">60</span>
      <div class="separator"></div>
      <button id="btn-reveal-all" class="btn btn-secondary">Alles aufdecken</button>
      <button id="btn-hide-all" class="btn btn-secondary">Alles verdecken</button>
      <div class="separator"></div>
      <button id="btn-ping-players" class="btn btn-secondary" title="Alle Spieler anpingen">&#x1F514; Ping</button>
    </div>
    <div class="toolbar-right">
      <button id="btn-save-session" class="btn btn-secondary" title="Session speichern">&#x1F4BE; Speichern</button>
      <button id="btn-load-session" class="btn btn-secondary" title="Session laden">&#x1F4C2; Laden</button>
      <div class="separator"></div>
      <button id="btn-remote-mode" class="btn btn-secondary remote-mode-btn" title="Remote Session verwalten">&#x1F310; Remote</button>
      <div class="separator"></div>
      <div id="volume-control" class="volume-control">
        <span class="volume-icon" id="volume-icon" title="Stummschalten">&#x1F50A;</span>
        <input id="volume-slider" type="range" min="0" max="100" value="50" title="Lautstärke" />
      </div>
      <span id="status-text" class="status-text">Kein Bild geladen</span>
    </div>
  </div>

  <!-- Main area: sidebar + canvas -->
  <div id="main-area">

    <!-- Image deck sidebar -->
    <div id="image-deck">
      <div id="deck-header">
        <span>Karten</span>
        <button id="btn-deck-add" class="btn btn-primary btn-deck-add-btn" title="Karte(n) hinzufügen">+</button>
      </div>
      <div id="deck-list"></div>

      <!-- Grid panel -->
      <div id="grid-section">
        <div id="grid-header" class="collapsible-header">
          <span>Gitter</span>
          <button id="grid-toggle-btn" class="panel-toggle-btn" title="Ein-/Ausklappen">&#x25BE;</button>
        </div>
        <div id="grid-controls">
          <div class="grid-row">
            <label class="grid-check-label">
              <input type="checkbox" id="grid-visible-cb" />
              Gitter anzeigen
            </label>
          </div>
          <div class="grid-row grid-row-labeled">
            <label class="label-sm">Größe (px)</label>
            <input id="grid-size-input" type="number" min="1" value="" placeholder="—" class="grid-number-input" />
          </div>
          <div class="grid-row grid-row-labeled">
            <label class="label-sm">Versatz X</label>
            <div class="grid-nudge-group">
              <input id="grid-offset-x-input" type="number" value="0" class="grid-number-input" />
              <button id="grid-nudge-left" class="btn btn-secondary grid-nudge-btn" title="−1 px">←</button>
              <button id="grid-nudge-right" class="btn btn-secondary grid-nudge-btn" title="+1 px">→</button>
            </div>
          </div>
          <div class="grid-row grid-row-labeled">
            <label class="label-sm">Versatz Y</label>
            <div class="grid-nudge-group">
              <input id="grid-offset-y-input" type="number" value="0" class="grid-number-input" />
              <button id="grid-nudge-up" class="btn btn-secondary grid-nudge-btn" title="−1 px">↑</button>
              <button id="grid-nudge-down" class="btn btn-secondary grid-nudge-btn" title="+1 px">↓</button>
            </div>
          </div>
          <div class="grid-row grid-row-labeled">
            <label class="label-sm">Helligkeit</label>
            <div class="grid-opacity-row">
              <span class="grid-opacity-label">dunkel</span>
              <input id="grid-opacity-slider" type="range" min="3" max="80" value="15" class="grid-opacity-slider" />
              <span class="grid-opacity-label">hell</span>
            </div>
          </div>
          <div class="grid-row grid-row-full">
            <button id="btn-grid-align" class="btn btn-secondary grid-full-btn">Versatz ziehen</button>
          </div>
          <div class="grid-row grid-row-full">
            <button id="btn-calibrate" class="btn btn-secondary grid-full-btn">Kalibrieren</button>
          </div>
        </div>
      </div>

      <!-- Players panel -->
      <div id="players-section">
        <div id="players-header" class="collapsible-header">
          <span>Spieler</span>
          <button id="players-toggle-btn" class="panel-toggle-btn" title="Ein-/Ausklappen">&#x25BE;</button>
        </div>
        <div id="players-controls">
          <div id="players-list"></div>
          <div id="players-add-row" style="display:none">
            <input id="players-add-input" type="text" placeholder="Name…" autocomplete="off" />
            <button id="players-add-confirm" class="btn btn-primary btn-icon" title="Hinzufügen">&#x2713;</button>
            <button id="players-add-cancel" class="btn btn-secondary btn-icon" title="Abbrechen">&#x2715;</button>
          </div>
          <button id="btn-add-global-player" class="btn btn-secondary players-add-btn">+ Spieler</button>
        </div>
      </div>

      <!-- Music panel -->
      <div id="music-section">
        <div id="music-header">
          <span>Musik</span>
          <span class="music-note">&#x1F3B5;</span>
        </div>
        <div id="music-search-row">
          <input id="music-search-input" type="text" placeholder="YouTube suchen…" autocomplete="off" />
          <button id="music-search-btn" class="btn btn-primary btn-icon" title="Suchen">&#x1F50D;</button>
        </div>
        <div id="music-results"></div>
        <div id="music-now-playing" style="display:none">
          <div id="music-now-title"></div>
          <button id="music-stop-btn" class="btn btn-secondary btn-icon" title="Stoppen">&#x23F9;</button>
        </div>
      </div>
    </div>

    <!-- Canvas area -->
    <div id="canvas-container" class="canvas-container">
      <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-inner">
          <div class="drop-icon">🗺</div>
          <p>Karte hier ablegen</p>
          <p class="drop-sub">oder</p>
          <button id="btn-load-drop" class="btn btn-primary">Datei auswählen</button>
        </div>
      </div>

      <!-- Image layer -->
      <canvas id="canvas-image" class="canvas-layer"></canvas>
      <!-- Grid overlay (above image, below fog) -->
      <canvas id="canvas-grid" class="canvas-layer canvas-grid-layer"></canvas>
      <!-- Fog overlay (DM sees semi-transparent fog) -->
      <canvas id="canvas-fog" class="canvas-layer canvas-fog-dm"></canvas>
      <!-- Token layer (above fog) -->
      <canvas id="canvas-tokens" class="canvas-layer canvas-tokens-layer"></canvas>
      <!-- Ping animation layer (above tokens) -->
      <canvas id="canvas-ping" class="canvas-layer canvas-ping-layer"></canvas>
      <!-- Brush cursor preview -->
      <canvas id="canvas-cursor" class="canvas-layer canvas-cursor"></canvas>
    </div>

    <!-- Combat Tracker Sidebar (right) -->
    <div id="combat-deck">
      <div id="combat-header">
        <span>Initiative</span>
      </div>
      <div id="combat-list"></div>
      <div id="combat-footer">
        <button id="btn-add-monster" class="btn btn-secondary combat-footer-btn" title="Monster hinzufügen">⚔ Monster</button>
        <button id="btn-add-player" class="btn btn-secondary combat-footer-btn" title="Spieler hinzufügen">🧙 Spieler</button>
      </div>

      <!-- Overlay: Kämpfer hinzufügen -->
      <div id="combat-add-overlay" style="display:none">
        <div id="combat-add-type-label"></div>
        <div class="combat-add-field">
          <label class="label-sm">Name</label>
          <input id="combat-add-name" type="text" placeholder="Name…" autocomplete="off" />
        </div>
        <div id="combat-add-hp-fields" class="combat-add-field" style="display:none">
          <label class="label-sm">Max HP</label>
          <input id="combat-add-maxhp" type="number" min="1" max="9999" value="10" />
        </div>
        <div id="combat-add-actions">
          <button id="combat-add-confirm" class="btn btn-primary">Hinzufügen</button>
          <button id="combat-add-cancel" class="btn btn-secondary">Abbrechen</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Calibration overlay -->
  <div id="calibrate-overlay" style="display:none">
    <div class="calibrate-backdrop"></div>
    <div class="calibrate-box">
      <p>Gemessene Strecke: <strong id="calibrate-px">0</strong> px</p>
      <label class="calibrate-label">
        Entspricht
        <input id="calibrate-fields" type="number" value="10" min="1" class="calibrate-fields-input" />
        Feldern
      </label>
      <div class="calibrate-actions">
        <button id="calibrate-confirm" class="btn btn-primary">Bestätigen</button>
        <button id="calibrate-cancel" class="btn btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Remote Session Panel -->
  <div id="remote-panel" style="display:none">
    <div class="remote-panel-header">
      <span class="remote-panel-title">&#x1F310; Remote Session</span>
      <button id="remote-panel-close" class="btn btn-secondary btn-icon" title="Schließen">&#x2715;</button>
    </div>
    <div id="remote-panel-inactive">
      <p class="remote-panel-hint">Spieler treten über den Browser bei – kein Setup nötig.</p>
      <button id="btn-start-remote" class="btn btn-primary remote-start-btn">Session starten</button>
    </div>
    <div id="remote-panel-active" style="display:none">
      <div class="remote-session-code-row">
        <span class="remote-code-label">Code</span>
        <span id="remote-session-code" class="remote-session-code"></span>
        <button id="btn-copy-session-link" class="btn btn-secondary btn-sm" title="Allgemeinen Link kopieren">&#x1F4CB;</button>
      </div>
      <div class="remote-player-links-label">Spieler-Links</div>
      <div id="remote-player-links"></div>
      <button id="btn-end-remote" class="btn btn-secondary remote-end-btn">Session beenden</button>
    </div>
  </div>

  <!-- Token context menu (right-click on placed token) -->
  <div id="token-ctx-menu" style="display:none">
    <div class="ctx-menu-title" id="token-ctx-name"></div>
    <div class="ctx-menu-section">
      <span class="ctx-menu-label">Tokengröße</span>
      <div class="ctx-menu-row">
        <button id="token-ctx-size-minus" class="btn ctx-menu-btn">−</button>
        <span id="token-ctx-size-val">40</span><span class="ctx-menu-unit"> px</span>
        <button id="token-ctx-size-plus" class="btn ctx-menu-btn">+</button>
      </div>
      <div class="ctx-menu-presets">
        <button class="btn ctx-preset-btn" data-size="20">XS</button>
        <button class="btn ctx-preset-btn" data-size="40">M</button>
        <button class="btn ctx-preset-btn" data-size="60">L</button>
        <button class="btn ctx-preset-btn" data-size="90">XL</button>
      </div>
    </div>
    <button id="token-ctx-remove" class="btn ctx-menu-remove-btn">Von Karte entfernen</button>
  </div>

  <script src="dm-screen.js"></script>
</body>
</html>
